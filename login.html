<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - Company Profile</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-white text-slate-900 font-sans min-h-screen m-0 flex">

  <!-- Left Side Visuals -->
  <div class="hidden md:flex flex-1 bg-slate-900 text-white p-16 flex-col relative overflow-hidden">
    <!-- Decorative Pattern -->
    <div class="absolute inset-0 opacity-5" style="background-image: radial-gradient(circle, white 1px, transparent 1px); background-size: 40px 40px; transform: rotate(30deg) scale(2);"></div>
    
    <div class="relative z-10 max-w-lg my-auto">
      <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-white/10 backdrop-blur-md mb-10 border border-white/20">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
          <path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z" fill="white" fill-opacity="0.2"/>
        </svg>
      </div>
      <h1 class="text-5xl font-bold leading-tight mb-6 tracking-tight">Welcome to<br>CP Admin panel! 👋</h1>
      <p class="text-lg text-white/80 leading-relaxed font-normal">Focus on designing premium UI components, styling layouts, and general configurations.</p>
    </div>
    
    <div class="relative z-10 text-sm text-white/50 mt-auto">
      &copy; 2026 Company Profile. All rights reserved.
    </div>
  </div>

  <!-- Right Side Form -->
  <div class="flex-1 flex flex-col justify-center items-center p-10 bg-white">
    <div class="w-full max-w-[400px]">
      
      <!-- Mobile Logo -->
      <div class="flex md:hidden items-center gap-3 mb-8">
        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
            <path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z" fill="white" fill-opacity="0.15"/>
          </svg>
        </div>
        <div class="font-bold text-xl text-slate-900">CP Admin</div>
      </div>

      <div class="mb-8">
        <h2 class="text-[28px] font-bold text-slate-900 mb-2 tracking-tight">Login</h2>
        <p class="text-[15px] text-slate-500">Enter your email and password to access the dashboard.</p>
      </div>

      <form action="index.html">
        <div class="mb-5">
          <label class="block text-[13px] font-medium text-slate-600 mb-2" for="email">Email Address</label>
          <input type="email" id="email" class="w-full h-12 px-4 border border-slate-300 rounded-xl bg-slate-50 text-slate-900 outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-600/10 text-sm" placeholder="admin@company.com" required>
        </div>
        <div class="mb-5">
          <label class="block text-[13px] font-medium text-slate-600 mb-2" for="password">Password</label>
          <input type="password" id="password" class="w-full h-12 px-4 border border-slate-300 rounded-xl bg-slate-50 text-slate-900 outline-none transition-all focus:border-blue-600 focus:bg-white focus:ring-4 focus:ring-blue-600/10 text-sm" placeholder="••••••••" required>
        </div>
        
        <button type="submit" class="w-full h-12 rounded-xl text-[15px] font-semibold flex items-center justify-center transition-all bg-slate-900 text-white shadow-sm hover:bg-slate-800 hover:-translate-y-px hover:shadow-md mt-3">
          Sign In
        </button>
      </form>
      
      <div class="flex justify-center items-center mt-6 text-sm text-slate-500">
        Forgot password? <a href="#" class="text-slate-900 font-semibold ml-1.5 hover:underline">Click here</a>
      </div>
    </div>
  </div>

</body>
</html>
