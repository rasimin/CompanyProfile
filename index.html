<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Profile Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="bg-slate-50 text-slate-900 font-sans min-h-screen">

  <div id="overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden transition-opacity"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 bottom-0 w-[260px] bg-slate-900 text-slate-300 flex flex-col z-40 transform -translate-x-full transition-transform duration-300 lg:translate-x-0 border-r border-white/5">
    <div class="h-[72px] flex items-center px-5 border-b border-slate-700/50 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2l7 4v6c0 5-3.5 9-7 10-3.5-1-7-5-7-10V6l7-4z" fill="currentColor" fill-opacity="0.15"/>
          </svg>
        </div>
        <div>
          <div class="text-white font-semibold text-[17px] leading-tight">CP Admin</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto p-4 pb-6">
      <div class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 my-2">Main Menu</div>
      
      <a href="#ui-components" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-lg text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group active-nav" data-route="ui-components">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
          <span class="text-sm">UI Components</span>
        </div>
      </a>

      <!-- Parent/Child Menu Example -->
      <div class="nav-item-group mb-0.5">
        <button class="toggle-submenu w-full flex items-center justify-between px-3 py-2.5 rounded-lg text-slate-300 transition-colors hover:bg-slate-800/70 hover:text-white group focus:outline-none">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span class="text-sm">Settings</span>
          </div>
          <svg class="w-4 h-4 text-slate-500 transition-transform duration-200 chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="submenu hidden flex-col border-l border-slate-700/60 ml-5 mt-1 mb-2">
          <a href="#settings-general" class="nav-link flex items-center py-2.5 pl-5 -ml-px border-l-2 border-transparent text-[13px] text-slate-400 hover:text-slate-200 transition-colors" data-route="settings-general">General</a>
          <a href="#settings-security" class="nav-link flex items-center py-2.5 pl-5 -ml-px border-l-2 border-transparent text-[13px] text-slate-400 hover:text-slate-200 transition-colors" data-route="settings-security">Security</a>
        </div>
      </div>
      
      <div class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 mt-6 mb-2">Account</div>
      <a href="login.html" class="flex items-center justify-between px-3 py-2.5 rounded-lg text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          <span class="text-sm">Logout</span>
        </div>
      </a>
    </nav>
  </aside>

  <!-- Main Layout -->
  <div id="main-wrapper" class="flex flex-col min-h-screen lg:ml-[260px] transition-all duration-300">
    
    <!-- Header -->
    <header class="sticky top-0 z-20 bg-white border-b border-[#ECEDF3] h-[72px] flex items-center px-6 justify-between gap-4">
      <div class="flex items-center gap-3 flex-1">
        <button id="menuBtn" class="p-2 -ml-2 text-slate-500 rounded-lg hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="Cari sesuatu...">
        </div>
      </div>

      <div class="topbar-actions">
        <div class="icon-btn"><span class="ping"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M21 8l-9 6-9-6"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
        </div>
        <div class="topbar-avatar">AD</div>
      </div>
    </header>

    <!-- Dynamic Content Area -->
    <main id="app-content" class="main flex-1">
      <!-- Views will be loaded here by main.js -->
    </main>

  </div>

  <style>
    /* Active nav state */
    .active-nav { background-color: #1e293b !important; color: white !important; }
    .active-nav > div > svg { color: #cbd5e1 !important; }
    /* Submenu active state overrides */
    .submenu .active-nav { background-color: rgba(30, 41, 59, 0.4) !important; border-left-color: #94a3b8 !important; color: white !important; border-radius: 0 8px 8px 0; }
  </style>

  <script type="module" src="./main.js"></script>
</body>
</html>
