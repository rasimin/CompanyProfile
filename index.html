<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Company Profile Admin - AutoDrive Showroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body class="text-slate-900 font-sans min-h-screen">

  <div id="overlay" class="fixed inset-0 bg-slate-900/50 z-40 hidden lg:hidden transition-opacity"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 bottom-0 w-[260px] bg-slate-900 text-slate-300 flex flex-col z-40 transform -translate-x-full transition-transform duration-300 lg:translate-x-0 border-r border-white/5">
    <div class="h-[72px] flex items-center px-5 border-b border-slate-700/50 shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-md bg-blue-600 flex items-center justify-center shadow-lg shadow-blue-600/30">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z" fill="currentColor" fill-opacity="0.85"/>
          </svg>
        </div>
        <div>
          <div class="text-white font-semibold text-[17px] leading-tight">AutoDrive Admin</div>
        </div>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto p-4 pb-6">
      <div class="text-[11px] font-semibold text-slate-500 uppercase tracking-wider px-3 my-2">Main Menu</div>
      
      <a href="#dashboard" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group active-nav" data-route="dashboard">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/>
          </svg>
          <span class="text-sm">Dashboard Overview</span>
        </div>
      </a>

      <a href="#home-settings" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="home-settings">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-sm">Pengaturan Beranda</span>
        </div>
      </a>

      <a href="#about-us" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="about-us">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
          </svg>
          <span class="text-sm">Tentang Kami</span>
        </div>
      </a>

      <a href="#services" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="services">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <span class="text-sm">Kelola Layanan</span>
        </div>
      </a>

      <a href="#products" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="products">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99z"/>
          </svg>
          <span class="text-sm">Katalog Unit</span>
        </div>
      </a>

      <a href="#portfolio" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="portfolio">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
          </svg>
          <span class="text-sm">Galeri Serah Terima</span>
        </div>
      </a>

      <a href="#blog" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="blog">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1M19 20a2 2 0 002-2V8a2 2 0 00-2-2h-5a2 2 0 00-2 2v3m9 11h-3m-9.07-12h.01m-.01 4h.01M9 16h3m-3-4h3"/>
          </svg>
          <span class="text-sm">Artikel Otomotif</span>
        </div>
      </a>

      <a href="#inbox" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="inbox">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <span class="text-sm">Hubungi Kami</span>
        </div>
      </a>

      <a href="#user-role-access" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="user-role-access">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <circle cx="12" cy="11" r="3"/>
            <path d="M12 14v4"/>
          </svg>
          <span class="text-sm">Akses Kontrol</span>
        </div>
      </a>

      <a href="#ui-components" class="nav-link flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 mb-0.5 transition-colors hover:bg-slate-800/70 hover:text-white group" data-route="ui-components">
        <div class="flex items-center gap-3">
          <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 5a1 1 0 011-1h14a1 1 0 011 1v2a1 1 0 01-1 1H5a1 1 0 01-1-1V5zM4 13a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H5a1 1 0 01-1-1v-6zM16 13a1 1 0 011-1h2a1 1 0 011 1v6a1 1 0 01-1 1h-2a1 1 0 01-1-1v-6z"/></svg>
          <span class="text-sm">UI Components</span>
        </div>
      </a>

      <!-- Parent/Child Menu Example -->
      <div class="nav-item-group mb-0.5">
        <button class="toggle-submenu w-full flex items-center justify-between px-3 py-2.5 rounded-md text-slate-300 transition-colors hover:bg-slate-800/70 hover:text-white group focus:outline-none">
          <div class="flex items-center gap-3">
            <svg class="w-4 h-4 text-slate-400 group-hover:text-slate-300" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            <span class="text-sm">Settings</span>
          </div>
          <svg class="w-4 h-4 text-slate-500 transition-transform duration-200 chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
        </button>
        <div class="submenu hidden flex-col border-l border-slate-700/60 ml-5 mt-1 mb-2">
          <a href="#settings-general" class="nav-link flex items-center py-2.5 pl-5 -ml-px border-l-2 border-transparent text-[13px] text-slate-400 hover:text-slate-200 transition-colors" data-route="settings-general">General</a>
          <a href="#settings-security" class="nav-link flex items-center py-2.5 pl-5 -ml-px border-l-2 border-transparent text-[13px] text-slate-400 hover:text-slate-200 transition-colors" data-route="settings-security">Security</a>
        </div>
      </div>
      

    </nav>
  </aside>

  <!-- Main Layout -->
  <div id="main-wrapper" class="flex flex-col min-h-screen lg:ml-[260px] transition-all duration-300">
    
    <!-- Header -->
    <header class="sticky top-0 z-20 bg-white border-b border-[#ECEDF3] h-[72px] flex items-center px-6 justify-between gap-4">
      <div class="flex items-center gap-3 flex-1">
        <button id="menuBtn" class="p-2 -ml-2 text-slate-500 rounded-md hover:bg-slate-100 hover:text-slate-900 transition-colors">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="Cari sesuatu...">
        </div>
      </div>

      <div class="topbar-actions">
        <div class="icon-btn"><span class="ping"></span>
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        </div>
        <div class="icon-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16v16H4z" opacity="0"/><path d="M21 8l-9 6-9-6"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
        </div>
        <div class="dropdown-wrap">
          <button id="header-avatar-btn" class="topbar-avatar focus:outline-none" onclick="toggleDropdown('user-dropdown')">AD</button>
          <div id="user-dropdown" class="dropdown-menu dropdown-menu-right" style="min-width: 200px; margin-top: 8px;">
            <div class="dropdown-label px-3 py-1.5 text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Akun Saya</div>
            <a href="#profile" class="dropdown-item" onclick="toggleDropdown('user-dropdown')">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              <span>Lihat Akun</span>
            </a>
            <a href="#settings-security" class="dropdown-item" onclick="toggleDropdown('user-dropdown')">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
              <span>Change Password</span>
            </a>
            <div class="dropdown-divider"></div>
            <a href="login.html" class="dropdown-item dropdown-danger">
              <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              <span>Logout</span>
            </a>
          </div>
        </div>
      </div>
    </header>

    <!-- Dynamic Content Area -->
    <main id="app-content" class="main flex-1">
      <!-- Views will be loaded here by main.js -->
    </main>

  </div>

  <style>
    /* Active nav state */
    .active-nav { background-color: #1e293b !important; color: white !important; }
    .active-nav > div > svg { color: #cbd5e1 !important; }
    /* Submenu active state overrides */
    .submenu .active-nav { background-color: rgba(30, 41, 59, 0.4) !important; border-left-color: #94a3b8 !important; color: white !important; border-radius: 0 6px 6px 0; }
  </style>

  <script type="module" src="./main.js"></script>
</body>
</html>
