<div id="about-us-container" class="space-y-6">
  <!-- Welcome Banner -->
  <div class="welcome mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Tentang Kami</h1>
      <p class="text-sm text-slate-500">Kelola riwayat profil perusahaan, visi, misi, dan daftar anggota tim struktural.</p>
    </div>
    <div>
      <button id="btn-save-about-us" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors shadow-sm shadow-blue-600/10 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
        Simpan Profil
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
    <!-- Company Profile Forms (Left) -->
    <div class="lg:col-span-6 bg-white border border-slate-100 rounded-xl shadow-sm p-5 space-y-4">
      <h3 class="font-bold text-slate-900 text-sm border-b border-slate-100 pb-3">Profil Perusahaan & Nilai Inti</h3>
      
      <form id="company-profile-form" class="space-y-4">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Nama Perusahaan / Organisasi</label>
          <input type="text" id="company-name-input" class="form-input-premium input-lg" placeholder="Nama instansi..." required>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Visi Perusahaan</label>
          <textarea id="company-vision-input" rows="3" class="form-textarea-premium input-lg" placeholder="Visi utama..." required></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Misi Perusahaan</label>
          <textarea id="company-mission-input" rows="4" class="form-textarea-premium input-lg" placeholder="Tuliskan misi (satu poin per baris)..." required></textarea>
        </div>
      </form>
    </div>

    <!-- Team Members Table (Right) -->
    <div class="lg:col-span-6 bg-white border border-slate-100 rounded-xl shadow-sm p-5 space-y-4">
      <div class="flex items-center justify-between border-b border-slate-100 pb-3">
        <h3 class="font-bold text-slate-900 text-sm">Struktur Anggota Tim</h3>
        <button id="btn-add-team-member" class="px-3 py-1.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors flex items-center gap-1">
          + Anggota Baru
        </button>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse text-sm">
          <thead class="bg-slate-50">
            <tr>
              <th class="py-2.5 px-3 text-slate-500 font-semibold text-xs">Anggota</th>
              <th class="py-2.5 px-3 text-slate-500 font-semibold text-xs">Jabatan / Posisi</th>
              <th class="py-2.5 px-3 text-slate-500 font-semibold text-xs text-right">Aksi</th>
            </tr>
          </thead>
          <tbody id="team-table-body" class="divide-y divide-slate-100">
            <!-- Loaded dynamically by main.js -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Team Member Modal -->
  <div id="team-modal" class="modal-overlay-premium">
    <div class="modal-dialog-premium max-w-2xl w-full">
      <div class="modal-header">
        <h4 id="team-modal-title" class="text-base font-bold text-slate-900">Tambah Anggota Tim</h4>
        <button class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none" onclick="toggleModal('team-modal', false)">&times;</button>
      </div>
      <form id="team-modal-form" class="p-6 space-y-5">
        <input type="hidden" id="team-modal-action-id" value="">
        <!-- Upload Avatar at TOP -->
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Foto Staf / Avatar</label>
          <div class="upload-dropzone" onclick="document.getElementById('team-modal-avatar-input').click()" style="cursor:pointer;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
              <div id="team-modal-avatar-preview" class="w-16 h-16 rounded-full bg-slate-100 border-2 border-dashed border-slate-300 text-slate-500 flex items-center justify-center font-bold text-lg overflow-hidden">T</div>
              <span class="placeholder">Klik atau seret foto di sini</span>
            </div>
            <input type="file" id="team-modal-avatar-input" accept="image/*" class="hidden">
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Nama Lengkap</label>
          <input type="text" id="team-modal-name" required placeholder="Nama lengkap staf..." class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Jabatan / Posisi</label>
          <input type="text" id="team-modal-role" required placeholder="E.g., Chief Executive Officer, Sales Manager, Chief Inspector" class="form-input-premium input-lg">
        </div>
        <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-2">
          <button type="button" class="px-5 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors" onclick="toggleModal('team-modal', false)">Batal</button>
          <button type="submit" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm shadow-blue-600/10">Simpan Anggota</button>
        </div>
      </form>
    </div>
  </div>
</div>
