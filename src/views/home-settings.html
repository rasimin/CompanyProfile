<div id="home-settings-container" class="space-y-6">
  <!-- Welcome Banner -->
  <div class="welcome mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Pengaturan Beranda</h1>
      <p class="text-sm text-slate-500">Konfigurasi konten spanduk utama (Hero) dan sorotan keunggulan di halaman depan website.</p>
    </div>
    <div>
      <button id="btn-save-home-settings" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors shadow-sm shadow-blue-600/10 flex items-center gap-2">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"/></svg>
        Simpan Perubahan
      </button>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
    <!-- Hero Banner Form (Left) -->
    <div class="lg:col-span-7 bg-white border border-slate-100 rounded-xl shadow-sm p-5 space-y-4">
      <h3 class="font-bold text-slate-900 text-sm border-b border-slate-100 pb-3">Konfigurasi Hero Banner</h3>
      
      <form id="hero-settings-form" class="space-y-4">
        <!-- Gambar Banner at TOP -->
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Gambar Banner Utama</label>
          <div class="upload-dropzone" onclick="document.getElementById('hero-image-input').click()" style="cursor:pointer;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
              <svg class="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <div id="hero-image-preview" class="w-full max-h-32 rounded overflow-hidden hidden"></div>
              <span class="placeholder">Klik atau seret gambar di sini</span>
              <p class="text-[11px] text-slate-400">Rekomendasi dimensi: 1920x1080px (maksimal 2MB).</p>
            </div>
            <input type="file" id="hero-image-input" accept="image/*" class="hidden">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Judul Utama (Hero Title)</label>
          <input type="text" id="hero-title-input" class="form-input-premium input-lg" placeholder="E.g., Sayangi Hewan Peliharaan Anda Bersama Kami" required>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Subjudul Utama (Hero Subtitle)</label>
          <textarea id="hero-subtitle-input" rows="3" class="form-textarea-premium input-lg" placeholder="E.g., Kami menyediakan perawatan medis terbaik, daycare premium, dan salon kecantikan hewan peliharaan..." required></textarea>
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Teks Tombol CTA</label>
            <input type="text" id="hero-cta-text" class="form-input-premium input-lg" placeholder="E.g., Hubungi Kami" required>
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Tautan Tombol (URL)</label>
            <input type="text" id="hero-cta-url" class="form-input-premium input-lg" placeholder="E.g., #contact" required>
          </div>
        </div>
      </form>
    </div>

    <!-- Highlights Section (Right) -->
    <div class="lg:col-span-5 bg-white border border-slate-100 rounded-xl shadow-sm p-5 space-y-4">
      <div class="flex items-center justify-between border-b border-slate-100 pb-3">
        <h3 class="font-bold text-slate-900 text-sm">Highlights Keunggulan</h3>
        <button id="btn-add-highlight" class="px-3 py-1.5 text-xs font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors flex items-center gap-1">
          + Tambah
        </button>
      </div>

      <div id="highlights-list-container" class="space-y-3">
        <!-- Highlights loaded dynamically by JS -->
      </div>
    </div>
  </div>

  <!-- Highlight modal -->
  <div id="highlight-modal" class="modal-overlay-premium">
    <div class="modal-dialog-premium max-w-2xl w-full">
      <div class="modal-header">
        <h4 id="highlight-modal-title" class="text-base font-bold text-slate-900">Tambah Keunggulan</h4>
        <button class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none" onclick="toggleModal('highlight-modal', false)">&times;</button>
      </div>
      <form id="highlight-modal-form" class="p-6 space-y-5">
        <input type="hidden" id="highlight-modal-action-id" value="">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Ikon (Emoji)</label>
          <input type="text" id="highlight-modal-icon" required placeholder="E.g., 🩺, 🏩, ✂️" class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Judul Keunggulan</label>
          <input type="text" id="highlight-modal-title-input" required placeholder="E.g., Dokter Berpengalaman" class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Deskripsi Singkat</label>
          <textarea id="highlight-modal-desc" required rows="3" placeholder="Masukkan rincian singkat keunggulan..." class="form-textarea-premium input-lg"></textarea>
        </div>
        <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-2">
          <button type="button" class="px-5 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors" onclick="toggleModal('highlight-modal', false)">Batal</button>
          <button type="submit" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm shadow-blue-600/10">Simpan Keunggulan</button>
        </div>
      </form>
    </div>
  </div>
</div>
