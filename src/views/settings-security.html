<div>
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight mb-1">Security Settings</h1>
    <p class="text-sm text-slate-500 m-0">Update your password and manage account security.</p>
  </div>

  <div class="bg-white border border-slate-200 rounded-lg shadow-sm mb-6 p-6">
    <div class="max-w-2xl">
      <h3 class="font-semibold text-slate-900 mb-4">Change Password</h3>
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-600 mb-2">Current Password</label>
        <input type="password" class="w-full px-3.5 py-2.5 bg-white border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all" placeholder="Enter current password">
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-600 mb-2">New Password</label>
        <input type="password" class="w-full px-3.5 py-2.5 bg-white border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all" placeholder="Enter new password">
      </div>
      <div class="pt-4 border-t border-slate-100">
        <button class="px-5 py-2.5 text-sm font-semibold text-white bg-slate-900 rounded-xl hover:bg-slate-800 shadow-sm transition-colors">
          Update Password
        </button>
      </div>
    </div>
  </div>
</div>
