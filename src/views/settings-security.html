<div>
  <div class="welcome">
    <h1>Security Settings</h1>
    <p>Update your password and manage account security.</p>
  </div>

  <div class="panel">
    <div class="max-w-2xl">
      <h3 class="font-bold text-[16px] text-slate-900 mb-4">Change Password</h3>
      <div class="mb-5">
        <label class="block text-[13px] font-bold text-slate-700 mb-2">Current Password</label>
        <input type="password" class="w-full h-11 px-4 border-2 border-slate-200 rounded-xl bg-white text-slate-900 outline-none transition-colors focus:border-blue-600 text-[14px] font-medium placeholder:font-normal placeholder:text-slate-400" placeholder="Enter current password">
      </div>
      <div class="mb-5">
        <label class="block text-[13px] font-bold text-slate-700 mb-2">New Password</label>
        <input type="password" class="w-full h-11 px-4 border-2 border-slate-200 rounded-xl bg-white text-slate-900 outline-none transition-colors focus:border-blue-600 text-[14px] font-medium placeholder:font-normal placeholder:text-slate-400" placeholder="Enter new password">
      </div>
      <div class="pt-4 border-t border-slate-100">
        <button class="px-5 py-2.5 text-[14px] font-bold text-white bg-slate-900 rounded-xl hover:bg-slate-800 active:bg-slate-700 transition-colors">
          Update Password
        </button>
      </div>
    </div>
  </div>
</div>
