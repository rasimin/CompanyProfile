<div id="blog-container" class="space-y-6">
  <!-- Welcome Banner -->
  <div class="welcome mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Kelola Artikel / Blog</h1>
      <p class="text-sm text-slate-500">Tulis, jadwalkan, atau edit artikel dan berita seputar informasi tips hewan peliharaan di blog utama.</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-add-blog" class="px-4 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm shadow-blue-600/10">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        Tulis Artikel Baru
      </button>
    </div>
  </div>

  <!-- Filter and Search controls -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
    <div class="flex flex-1 flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
          <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </span>
        <input type="text" id="blog-search-input" placeholder="Cari judul artikel atau kata kunci..." class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-600 transition-colors bg-white">
      </div>
      <div class="w-full sm:w-48">
        <select id="blog-category-filter" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-600 transition-colors bg-white cursor-pointer appearance-none">
          <option value="all">Semua Kategori</option>
          <option value="Tips & Trik">Tips & Trik</option>
          <option value="Kesehatan">Kesehatan</option>
          <option value="Grooming">Grooming</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Blog Table -->
  <div class="panel overflow-hidden border border-slate-100 shadow-sm p-0 rounded-xl bg-white">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse text-sm">
        <thead class="bg-slate-50 border-b border-slate-100">
          <tr>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[45%]">Judul Artikel</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[15%]">Penulis</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[15%]">Tanggal</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[13%] text-center">Status</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[12%] text-right">Aksi</th>
          </tr>
        </thead>
        <tbody id="blog-table-body" class="divide-y divide-slate-100">
          <!-- Dynamic Content Loaded by JS -->
        </tbody>
      </table>
    </div>
    <div id="blog-table-empty" class="hidden p-8 text-center text-slate-400">
      <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
      <p class="font-medium text-slate-500">Tidak ada artikel ditemukan</p>
    </div>
  </div>

  <!-- Blog Modal -->
  <div id="blog-modal" class="modal-overlay-premium">
    <div class="modal-dialog-premium max-w-3xl w-full">
      <div class="modal-header">
        <h4 id="blog-modal-title" class="text-base font-bold text-slate-900">Tulis Artikel Baru</h4>
        <button class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none" onclick="toggleModal('blog-modal', false)">&times;</button>
      </div>
      <form id="blog-modal-form" class="p-6 space-y-5">
        <input type="hidden" id="blog-modal-action-id" value="">

        <!-- Gambar Sampul at TOP -->
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Gambar Sampul Artikel</label>
          <div class="upload-dropzone" onclick="document.getElementById('blog-modal-cover-input').click()" style="cursor:pointer;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
              <svg class="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <div id="blog-modal-cover-preview" class="w-full max-h-32 rounded overflow-hidden hidden"></div>
              <span class="placeholder">Klik atau seret gambar sampul di sini</span>
              <p class="text-[11px] text-slate-400">Rekomendasi: 1200x630px (maks 2MB)</p>
            </div>
            <input type="file" id="blog-modal-cover-input" accept="image/*" class="hidden">
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Judul Artikel</label>
            <input type="text" id="blog-modal-title-input" required placeholder="Masukkan judul..." class="form-input-premium input-lg">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Kategori</label>
            <select id="blog-modal-category" class="form-input-premium input-lg">
              <option value="Tips & Trik">Tips & Trik</option>
              <option value="Kesehatan">Kesehatan</option>
              <option value="Grooming">Grooming</option>
            </select>
          </div>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Penulis (Author)</label>
            <input type="text" id="blog-modal-author" required placeholder="Nama penulis..." class="form-input-premium input-lg">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Status Publikasi</label>
            <select id="blog-modal-status" class="form-input-premium input-lg">
              <option value="active">Dipublikasikan</option>
              <option value="inactive">Draf</option>
            </select>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Isi / Konten Artikel</label>
          <textarea id="blog-modal-content" required rows="6" placeholder="Tuliskan artikel lengkap di sini..." class="form-textarea-premium input-lg"></textarea>
        </div>
        <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-2">
          <button type="button" class="px-5 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors" onclick="toggleModal('blog-modal', false)">Batal</button>
          <button type="submit" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm shadow-blue-600/10">Simpan Artikel</button>
        </div>
      </form>
    </div>
  </div>
</div>
