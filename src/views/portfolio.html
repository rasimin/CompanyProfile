<div id="portfolio-container" class="space-y-6">
  <!-- Welcome Banner -->
  <div class="welcome mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Galeri Serah Terima Unit</h1>
      <p class="text-sm text-slate-500">Kelola dokumentasi pameran, serah terima unit kendaraan kepada pelanggan (handover), dan event showroom.</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-add-portfolio" class="px-4 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm shadow-blue-600/10">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        Tambah Dokumentasi
      </button>
    </div>
  </div>

  <!-- Filter and Search controls -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
    <div class="relative flex-1">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
        <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
      </span>
      <input type="text" id="portfolio-search-input" placeholder="Cari dokumentasi serah terima..." class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-600 transition-colors bg-white">
    </div>
  </div>

  <!-- Portfolio Grid -->
  <div id="portfolio-grid-body" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <!-- Dynamic Cards loaded by JS -->
  </div>

  <div id="portfolio-empty-view" class="hidden p-8 text-center text-slate-400 bg-white border border-slate-100 rounded-xl">
    <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
    <p class="font-medium text-slate-500">Tidak ada dokumentasi serah terima ditemukan</p>
  </div>

  <!-- Portfolio Modal -->
  <div id="portfolio-modal" class="modal-overlay-premium">
    <div class="modal-dialog-premium max-w-2xl w-full">
      <div class="modal-header">
        <h4 id="portfolio-modal-title" class="text-base font-bold text-slate-900">Tambah Dokumentasi Baru</h4>
        <button class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none" onclick="toggleModal('portfolio-modal', false)">&times;</button>
      </div>
      <form id="portfolio-modal-form" class="p-6 space-y-5">
        <input type="hidden" id="portfolio-modal-action-id" value="">

        <!-- File Upload at TOP -->
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Foto Sampul / Gambar</label>
          <div class="upload-dropzone" onclick="document.getElementById('portfolio-modal-img-input').click()" style="cursor:pointer;">
            <div style="display:flex;flex-direction:column;align-items:center;gap:10px;">
              <svg class="w-10 h-10 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
              <div id="portfolio-modal-img-preview" class="w-full max-h-32 rounded overflow-hidden hidden"></div>
              <span class="placeholder">Klik atau seret gambar di sini</span>
              <p class="text-[11px] text-slate-400">Rekomendasi: 800x600px (maks 2MB)</p>
            </div>
            <input type="file" id="portfolio-modal-img-input" accept="image/*" class="hidden">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Nama / Judul Projek</label>
          <input type="text" id="portfolio-modal-title-input" required placeholder="E.g., Serah Terima Honda HR-V 2021 - Ibu Retno..." class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Lokasi / Klien</label>
          <input type="text" id="portfolio-modal-client" required placeholder="E.g., Tangerang, Jakarta Selatan..." class="form-input-premium input-lg">
        </div>
        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Kategori Dokumentasi</label>
            <input type="text" id="portfolio-modal-category" required placeholder="E.g., Handover, Event, Promo" class="form-input-premium input-lg">
          </div>
          <div>
            <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Tanggal Pelaksanaan</label>
            <input type="text" id="portfolio-modal-date" required placeholder="E.g., Mei 2026" class="form-input-premium input-lg">
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Deskripsi Dokumentasi</label>
          <textarea id="portfolio-modal-desc" rows="3" placeholder="Tuliskan deskripsi singkat projek ini..." class="form-textarea-premium input-lg"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Status Publikasi</label>
          <select id="portfolio-modal-status" class="form-input-premium input-lg">
            <option value="active">Aktif (Tampil)</option>
            <option value="inactive">Nonaktif (Draf)</option>
          </select>
        </div>
        <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-2">
          <button type="button" class="px-5 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors" onclick="toggleModal('portfolio-modal', false)">Batal</button>
          <button type="submit" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm shadow-blue-600/10">Simpan Dokumentasi</button>
        </div>
      </form>
    </div>
  </div>
</div>
