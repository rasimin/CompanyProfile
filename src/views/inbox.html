<div id="inbox-container" class="space-y-6">
  <!-- Welcome Banner -->
  <div class="welcome mb-6">
    <h1 class="text-2xl font-bold text-slate-900">Kotak Masuk / Hubungi Kami</h1>
    <p class="text-sm text-slate-500">Baca dan respon formulir pertanyaan, janji temu, dan kerjasama dari pengunjung situs.</p>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start h-[600px] min-h-[500px]">
    <!-- Inbox List (Left - col-span-5) -->
    <div class="lg:col-span-5 bg-white border border-slate-100 rounded-xl shadow-sm p-4 flex flex-col h-full overflow-hidden">
      <div class="relative mb-4 shrink-0">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
          <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </span>
        <input type="text" id="inbox-search-input" placeholder="Cari pengirim atau kata..." class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-600 transition-colors bg-white">
      </div>

      <div id="inbox-list-body" class="flex-1 overflow-y-auto divide-y divide-slate-100 pr-1 space-y-1">
        <!-- Loaded dynamically by main.js -->
      </div>
      
      <div id="inbox-list-empty" class="hidden p-8 text-center text-slate-400 my-auto">
        <p class="font-medium text-slate-500">Tidak ada pesan ditemukan</p>
      </div>
    </div>

    <!-- Message Details (Right - col-span-7) -->
    <div class="lg:col-span-7 bg-white border border-slate-100 rounded-xl shadow-sm p-5 flex flex-col h-full overflow-hidden relative">
      <div id="inbox-detail-view" class="h-full flex flex-col overflow-y-auto space-y-4 pr-1">
        <!-- Default State: No message selected -->
        <div class="m-auto text-center text-slate-400 space-y-3">
          <div class="w-16 h-16 rounded-full bg-slate-50 border border-slate-100 text-slate-300 flex items-center justify-center mx-auto text-2xl">
            📬
          </div>
          <h4 class="font-semibold text-slate-500 text-sm">Pilih Pesan untuk Dibaca</h4>
          <p class="text-xs text-slate-400 max-w-xs leading-relaxed">Klik salah satu pesan kontak di daftar sebelah kiri untuk menampilkan detail isi surat.</p>
        </div>
      </div>
    </div>
  </div>
</div>
