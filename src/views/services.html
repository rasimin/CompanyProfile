<div id="services-container" class="space-y-6">
  <!-- Welcome Banner -->
  <div class="welcome mb-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-slate-900">Kelola Layanan / Produk</h1>
      <p class="text-sm text-slate-500">Kelola jenis penawaran layanan pet care, penentuan harga, dan status publikasi di website utama.</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-add-service" class="px-4 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 active:bg-blue-800 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm shadow-blue-600/10">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" /></svg>
        Tambah Layanan
      </button>
    </div>
  </div>

  <!-- Filter and Search controls -->
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100">
    <div class="flex flex-1 flex-col sm:flex-row gap-3">
      <div class="relative flex-1">
        <span class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
          <svg class="w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
        </span>
        <input type="text" id="service-search-input" placeholder="Cari nama layanan..." class="w-full pl-9 pr-4 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-600 transition-colors bg-white">
      </div>
      <div class="w-full sm:w-48">
        <select id="service-category-filter" class="w-full px-3 py-2 text-sm border border-slate-200 rounded-lg outline-none focus:border-blue-600 transition-colors bg-white cursor-pointer appearance-none">
          <option value="all">Semua Kategori</option>
          <option value="Perawatan">Perawatan</option>
          <option value="Penitipan">Penitipan</option>
          <option value="Kesehatan">Kesehatan</option>
        </select>
      </div>
    </div>
  </div>

  <!-- Services Table -->
  <div class="panel overflow-hidden border border-slate-100 shadow-sm p-0 rounded-xl bg-white">
    <div class="overflow-x-auto">
      <table class="w-full text-left border-collapse text-sm">
        <thead class="bg-slate-50 border-b border-slate-100">
          <tr>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[35%]">Nama Layanan</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[15%]">Kategori</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[15%]">Estimasi Biaya</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[15%] text-center">Status</th>
            <th class="py-3.5 px-4 font-semibold text-slate-500 uppercase tracking-wider text-[11px] w-[15%] text-right">Aksi</th>
          </tr>
        </thead>
        <tbody id="services-table-body" class="divide-y divide-slate-100">
          <!-- Dynamic Content Loaded by JS -->
        </tbody>
      </table>
    </div>
    <div id="services-table-empty" class="hidden p-8 text-center text-slate-400">
      <svg class="w-12 h-12 mx-auto mb-3 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" /></svg>
      <p class="font-medium text-slate-500">Tidak ada data layanan ditemukan</p>
    </div>
  </div>

  <!-- Service Modal -->
  <div id="service-modal" class="modal-overlay-premium">
    <div class="modal-dialog-premium max-w-2xl w-full">
      <div class="modal-header">
        <h4 id="service-modal-title" class="text-base font-bold text-slate-900">Tambah Layanan Baru</h4>
        <button class="text-slate-400 hover:text-slate-600 text-2xl font-bold leading-none" onclick="toggleModal('service-modal', false)">&times;</button>
      </div>
      <form id="service-modal-form" class="p-6 space-y-5">
        <input type="hidden" id="service-modal-action-id" value="">
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Nama Layanan</label>
          <input type="text" id="service-modal-name" required placeholder="Masukkan nama layanan..." class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Kategori</label>
          <div class="relative">
            <select id="service-modal-category" class="form-input-premium input-lg">
              <option value="Perawatan">Perawatan</option>
              <option value="Penitipan">Penitipan</option>
              <option value="Kesehatan">Kesehatan</option>
            </select>
            <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
          </div>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Ikon / Emoji</label>
          <input type="text" id="service-modal-icon" required placeholder="E.g., ✂️, 🏩, 🩺, 🧴" class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Deskripsi Singkat</label>
          <textarea id="service-modal-desc" required rows="3" placeholder="Masukkan deskripsi layanan..." class="form-textarea-premium input-lg"></textarea>
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Estimasi Biaya</label>
          <input type="text" id="service-modal-price" required placeholder="E.g., Rp 150.000 atau Rp 50.000 / malam" class="form-input-premium input-lg">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Status Publikasi</label>
          <div class="relative">
            <select id="service-modal-status" class="form-input-premium input-lg">
              <option value="active">Aktif (Tampil)</option>
              <option value="inactive">Nonaktif (Draf)</option>
            </select>
            <svg class="w-4 h-4 absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
          </div>
        </div>
        <div class="pt-4 border-t border-slate-100 flex items-center justify-end gap-2">
          <button type="button" class="px-5 py-2.5 text-sm font-bold text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg transition-colors" onclick="toggleModal('service-modal', false)">Batal</button>
          <button type="submit" class="px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors shadow-sm shadow-blue-600/10">Simpan Layanan</button>
        </div>
      </form>
    </div>
  </div>
</div>
