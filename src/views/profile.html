<style>
  .avatar-upload-container {
    position: relative;
    width: 80px;
    height: 80px;
    margin-top: -40px;
    margin-bottom: 10px;
    cursor: pointer;
  }
  .avatar-upload-container:hover .avatar-overlay {
    opacity: 1 !important;
  }
</style>
<div>
  <!-- Welcome Banner -->
  <div class="welcome mb-6">
    <h1>Profil Akun</h1>
    <p>Informasi detail akun Anda dan ringkasan aktivitas.</p>
  </div>

  <!-- Profile Layout Grid -->
  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
    
    <!-- Left Column: Profile Card & System Info -->
    <div class="lg:col-span-4 flex flex-col gap-6">
      <!-- Profile Card -->
      <div class="profile-card">
        <div class="profile-card-banner"></div>
        <div class="profile-card-body">
          <div class="avatar-upload-container" onclick="document.getElementById('profile-avatar-input').click()">
            <div id="profile-avatar-display" class="avatar avatar-xl" style="background: linear-gradient(135deg, var(--violet-1), var(--violet-2)); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 24px; border: 3px solid white; box-shadow: 0 2px 8px rgba(43, 45, 58, 0.12); margin-bottom: 0; margin-top: 0; overflow: hidden; position: relative;">AD</div>
            <div class="avatar-overlay" style="position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s ease; border: 3px solid transparent; width: 80px; height: 80px; margin-top: -80px; pointer-events: none;">
              <svg style="width: 22px; height: 22px; color: white;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
              </svg>
            </div>
            <input type="file" id="profile-avatar-input" accept="image/*" class="hidden" style="display: none;">
          </div>
          <div class="profile-card-name">Admin AutoDrive</div>
          <div class="profile-card-role">Super Administrator</div>
          <div class="profile-card-stats">
            <div>
              <div class="pc-val">148</div>
              <div class="pc-lbl">Unit</div>
            </div>
            <div>
              <div class="pc-val">24</div>
              <div class="pc-lbl">Galeri</div>
            </div>
            <div>
              <div class="pc-val">48</div>
              <div class="pc-lbl">Artikel</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Quick stats panel -->
      <div class="panel p-5 bg-white border border-slate-100 rounded-xl shadow-sm" style="margin-bottom: 0;">
        <h4 class="font-bold text-slate-800 text-sm mb-4" style="margin: 0 0 16px 0; font-family: 'Poppins', sans-serif;">Informasi Sistem</h4>
        <div class="space-y-3" style="display: flex; flex-direction: column; gap: 12px;">
          <div class="flex justify-between items-center text-xs" style="display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <span class="text-slate-400" style="color: var(--muted);">Status Akun:</span>
            <span class="inline-flex items-center gap-1.5 px-2.5 py-0.5 rounded bg-emerald-50 text-emerald-700 font-semibold border border-emerald-100" style="background: #E7F8EF; color: #1AA964; font-weight: 700; font-size: 11px; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px;">
              <span class="w-1.5 h-1.5 rounded-full bg-emerald-500" style="width: 6px; height: 6px; border-radius: 50%; background: #1AA964; display: inline-block;"></span> Aktif
            </span>
          </div>
          <div class="flex justify-between items-center text-xs" style="display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <span class="text-slate-400" style="color: var(--muted);">Terakhir Login:</span>
            <span class="text-slate-700 font-semibold" style="color: var(--ink);">Hari ini, 09:14</span>
          </div>
          <div class="flex justify-between items-center text-xs" style="display: flex; justify-content: space-between; align-items: center; font-size: 13px;">
            <span class="text-slate-400" style="color: var(--muted);">IP Address:</span>
            <span class="text-slate-500 font-mono" style="color: var(--muted); font-family: monospace;">192.168.1.42</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right Column: Detail Form -->
    <div class="lg:col-span-8 panel" style="margin-bottom: 0;">
      <h3 class="font-bold text-lg text-slate-900 border-b border-slate-100 pb-3 mb-5" style="margin: 0 0 20px 0; font-family: 'Poppins', sans-serif;">Data Pribadi</h3>
      
      <div class="form-row-premium">
        <div class="form-group-premium">
          <label>Nama Lengkap</label>
          <input type="text" class="form-input-premium" value="Admin AutoDrive" readonly>
        </div>
        <div class="form-group-premium">
          <label>Username</label>
          <input type="text" class="form-input-premium" value="admin_autodrive" readonly>
        </div>
      </div>

      <div class="form-row-premium">
        <div class="form-group-premium">
          <label>Alamat Email</label>
          <input type="email" class="form-input-premium" value="admin@autodrive.com" readonly>
        </div>
        <div class="form-group-premium">
          <label>Nomor Telepon</label>
          <input type="text" class="form-input-premium" value="+62 812-3456-7890" readonly>
        </div>
      </div>

      <div class="form-group-premium" style="margin-bottom: 24px;">
        <label>Biografi Singkat</label>
        <textarea class="form-textarea-premium" readonly style="min-height: 100px;">Super Administrator untuk platform AutoDrive Admin. Mengelola perizinan pengguna, data unit kendaraan, dan keseluruhan konfigurasi dashboard.</textarea>
      </div>

      <div class="pt-5 border-t border-slate-100 flex items-center justify-between" style="border-top: 1px solid var(--line); padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
        <a href="#settings-general" class="btn-premium btn-md btn-secondary">
          <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Edit Pengaturan General
        </a>
        <a href="#settings-security" class="btn-premium btn-md btn-primary">
          <svg style="width:16px;height:16px;" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          Ganti Kata Sandi
        </a>
      </div>
    </div>
  </div>
</div>
