<div>
  <div class="welcome">
    <h1>General Settings</h1>
    <p>Manage global preferences and configurations for your website.</p>
  </div>

  <div class="panel">
    <div class="max-w-2xl">
      <div class="mb-5">
        <label class="block text-[13px] font-bold text-slate-700 mb-2">Website URL</label>
        <input type="text" class="w-full h-11 px-4 border-2 border-slate-200 rounded-md bg-white text-slate-900 outline-none transition-colors focus:border-blue-600 text-[14px] font-medium placeholder:font-normal placeholder:text-slate-400" value="https://companyprofile.com">
      </div>
      <div class="mb-5">
        <label class="block text-[13px] font-bold text-slate-700 mb-2">Timezone</label>
        <div class="relative">
          <select class="w-full h-11 px-4 pr-10 border-2 border-slate-200 rounded-md bg-white text-slate-900 outline-none transition-colors focus:border-blue-600 text-[14px] font-medium appearance-none cursor-pointer">
            <option>UTC +07:00 (Jakarta)</option>
            <option>UTC +00:00 (London)</option>
            <option>UTC -05:00 (New York)</option>
          </select>
          <svg class="w-5 h-5 absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <div class="pt-4 border-t border-slate-100">
        <button class="px-5 py-2.5 text-[14px] font-bold text-white bg-slate-900 rounded-md hover:bg-slate-800 active:bg-slate-700 transition-colors">
          Save Preferences
        </button>
      </div>
    </div>
  </div>
</div>
