<div>
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-slate-900 tracking-tight mb-1">General Settings</h1>
    <p class="text-sm text-slate-500 m-0">Manage global preferences and configurations for your website.</p>
  </div>

  <div class="bg-white border border-slate-200 rounded-2xl shadow-sm mb-6 p-6">
    <div class="max-w-2xl">
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-600 mb-2">Website URL</label>
        <input type="text" class="w-full px-3.5 py-2.5 bg-white border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all" value="https://companyprofile.com">
      </div>
      <div class="mb-5">
        <label class="block text-sm font-medium text-slate-600 mb-2">Timezone</label>
        <select class="w-full px-3.5 py-2.5 bg-white border border-slate-300 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-blue-100 focus:border-blue-600 transition-all">
          <option>UTC +07:00 (Jakarta)</option>
          <option>UTC +00:00 (London)</option>
          <option>UTC -05:00 (New York)</option>
        </select>
      </div>
      <div class="pt-4 border-t border-slate-100">
        <button class="px-5 py-2.5 text-sm font-semibold text-white bg-blue-600 rounded-xl hover:bg-blue-700 shadow-sm transition-colors">
          Save Preferences
        </button>
      </div>
    </div>
  </div>
</div>
